<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handmade</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #F0F0F5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: white;
            border-bottom: 1px solid #D0D0D5;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2em;
            margin: 0;
        }
        main {
            padding: 20px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: white;
            border-top: 1px solid #D0D0D5;
        }
        button {
            background-color: #007AFF;
            border: none;
            border-radius: 10px;
            color: white;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #005BB5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Handmade Creations</h1>
    </header>
    <main>
        <section>
            <h2>Your Creative Space</h2>
            <p>Welcome to our handmade creations showcase, where creativity meets craftsmanship!</p>
            <button>Explore More</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Handmade Creations</p>
    </footer>
</body>
</html>
